services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rosatom-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - app_storage:/var/www/storage
      - app_public:/var/www/public
    environment:
      APP_NAME: "Гостеприимные города Росатома"
      APP_ENV: production
      APP_KEY: "base64:ikB8a855q80m0P4r2LipcFH06LF9+5+OuUm/gqD/mGg="
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: rosatom
      DB_USERNAME: rosatom
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    networks:
      - rosatom
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: rosatom-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - app_public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - rosatom
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: rosatom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rosatom
      POSTGRES_USER: rosatom
      POSTGRES_PASSWORD: secret
    volumes:
      - rosatom_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - rosatom
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosatom -d rosatom"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rosatom-redis
    restart: unless-stopped
    networks:
      - rosatom

networks:
  rosatom:
    driver: bridge

volumes:
  rosatom_db_data:
  app_public:
  app_storage:
