name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          # known_hosts
          ssh-keyscan -H ${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }} >> ~/.ssh/known_hosts

      - name: Remote deploy (clone/fetch + compose)
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"        # owner/repo
          BRANCH="${{ github.ref_name }}"        # текущая ветка (master по триггеру)
          USER="${{ secrets.SSH_USER }}"
          HOST="${{ secrets.SSH_HOST }}"
          PORT="${{ secrets.SSH_PORT }}"
          TOKEN="${{ secrets.GIT_TOKEN }}"

          # дефолт порта, если не задан
          PORT="${PORT:-22}"

          PROJECT_DIR="/home/${USER}/projects/${REPO}"
          DOCKER_COMPOSE_DIR="${PROJECT_DIR}/app/docker"
          REPO_URL="https://${TOKEN}@github.com/${REPO}.git"

          # Отправляем на сервер готовый скрипт (значения разворачиваются локально)
          ssh -p "$PORT" "$USER@$HOST" 'bash -se' <<EOF
          set -euo pipefail

          if [ ! -d "$PROJECT_DIR/.git" ]; then
            mkdir -p "$PROJECT_DIR"
            git clone --quiet --depth 1 -b "$BRANCH" "$REPO_URL" "$PROJECT_DIR"
          else
            cd "$PROJECT_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --quiet origin "$BRANCH" --depth 1
            git checkout -B "$BRANCH" "origin/$BRANCH"
          fi

          cd "$DOCKER_COMPOSE_DIR"
          bash run.sh local
          EOF
